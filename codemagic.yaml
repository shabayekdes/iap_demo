# Codemagic CI/CD configuration for iap_demo
# Builds a signed AD-HOC iOS IPA installable on registered real devices.
#
# Mirrors the proven ad-hoc recipe from the lax_mobile project:
#   - manual `fetch-signing-files --create` (NOT the ios_signing block, which does
#     not reliably create ad-hoc profiles)
#   - a persisted private key so Apple's distribution-certificate cap isn't hit
#   - `keychain initialize` + `keychain add-certificates` to load the cert
#   - `use-profiles` AFTER `pod install`, which resets signing to automatic
#
# Requirements in the Codemagic UI:
#   1. App Store Connect integration named exactly "Sumaya369 Codemagic API Key".
#   2. CERT_PRIVATE_KEY_B64 available to this app (base64 of a PEM RSA private key).
#      Reuse the same one as lax_mobile -- the distribution certificate is per Apple
#      team, not per app. Make its variable group shared, or add the var to this app.
#   3. The test device's UDID registered in the Apple Developer portal.

workflows:
  ios-adhoc:
    name: iOS Ad-Hoc (real device)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # pubspec requires Dart sdk ^3.12.2, which ships with Flutter 3.44.2.
      flutter: 3.44.2
      xcode: latest
      cocoapods: default
      groups:
        # Supplies CERT_PRIVATE_KEY_B64. A workflow only receives variables from
        # groups it declares here -- without this the variable is simply not set.
        # Reuses the same distribution certificate as lax_mobile: the certificate
        # is per Apple team, not per app, so this avoids minting a second one and
        # hitting Apple's certificate cap.
        - lax_env_variables
      vars:
        BUNDLE_ID: "app.sumaya369.net"

    integrations:
      app_store_connect: Sumaya369 Codemagic API Key

    scripts:
      - name: List registered devices (diagnostic)
        # An ad-hoc profile cannot exist without at least one registered device.
        # An empty list here is the cause of "No matching profiles found".
        script: app-store-connect devices list --platform IOS || true

      - name: Create distribution certificate & ad-hoc profile
        script: |
          # Reuse ONE persisted private key across builds. Apple caps the number of
          # distribution certificates, so minting a fresh one every build eventually
          # fails with a 409. fetch-signing-files finds the cert matching this key,
          # or creates it once, then builds the ad-hoc profile.
          # fetch-signing-files cannot save a certificate without a private key
          # ("Cannot save Signing Certificates without certificate private key"),
          # so this variable is required -- fail fast with a useful message.
          if [ -z "$CERT_PRIVATE_KEY_B64" ]; then
            echo "ERROR: CERT_PRIVATE_KEY_B64 is not set."
            echo "Add it as a SECURE environment variable for this app in Codemagic."
            echo "It must be the base64 of a PEM RSA private key (base64 -w0 key.pem)."
            exit 1
          fi

          echo "$CERT_PRIVATE_KEY_B64" | base64 --decode > /tmp/ios_dist_key.pem

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS --type IOS_APP_ADHOC \
            --certificate-key=@file:/tmp/ios_dist_key.pem --create

          keychain initialize
          keychain add-certificates

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install pods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing settings on Xcode project
        # Must run AFTER pod install -- pod install regenerates the project and
        # resets signing to automatic. Writes /Users/builder/export_options.plist.
        script: xcode-project use-profiles --custom-export-options='{"manageAppVersionAndBuildNumber":false}'

      - name: Build ad-hoc IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # Codemagic emails a download/install link for the ad-hoc IPA. Open it on the
      # registered device to install over the air.
      email:
        recipients:
          - esmail.shabayek@gmail.com
        notify:
          success: true
          failure: true
